<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Tools Kit</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <h1>AI Tools Kit</h1>
            <p data-i18n="tagline">Web + CLI bilingual AI tools</p>
          </div>
        </div>

        <div class="search-wrap">
          <input id="searchInput" type="search" autocomplete="off" />
        </div>

        <nav id="toolList" class="tool-list" aria-label="AI tools"></nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p id="toolCategory" class="category">Writing</p>
            <h2 id="toolTitle">AI Tool</h2>
          </div>
          <div class="status">
            <span id="providerBadge">mock</span>
            <button id="copyButton" type="button">Copy</button>
          </div>
        </header>

        <section class="config-panel" aria-label="Run settings">
          <label>
            <span data-i18n="language">Language</span>
            <select id="languageSelect"></select>
          </label>
          <label>
            <span data-i18n="mode">Mode</span>
            <select id="optionSelect"></select>
          </label>
          <label>
            <span data-i18n="provider">Provider</span>
            <select id="providerSelect"></select>
          </label>
          <label>
            <span data-i18n="model">Model</span>
            <input id="modelInput" type="text" />
          </label>
        </section>

        <div id="providerNotice" class="provider-notice" role="status"></div>

        <section class="editor-grid">
          <div class="panel input-panel">
            <div class="panel-head">
              <label id="inputLabel" for="inputText">Input</label>
              <div class="panel-tools">
                <input id="fileInput" type="file" accept=".txt,.md,.json,.csv,.log,.js,.ts,.tsx,.jsx,.html,.css" hidden />
                <button id="fileButton" type="button">Import</button>
                <button id="sampleButton" type="button">Sample</button>
              </div>
            </div>
            <textarea id="inputText" spellcheck="false"></textarea>
            <div class="actions">
              <span id="charCount">0 chars</span>
              <button id="runButton" type="button">Run Tool</button>
            </div>
          </div>

          <div class="panel output-panel">
            <div class="panel-head">
              <span data-i18n="output">Output</span>
              <div class="panel-tools">
                <button class="export-button" type="button" data-export="md">MD</button>
                <button class="export-button" type="button" data-export="txt">TXT</button>
                <button class="export-button" type="button" data-export="json">JSON</button>
              </div>
            </div>
            <pre id="outputText">Choose a tool, paste your input, then run it.</pre>
            <div class="actions">
              <span id="runMeta">Ready</span>
            </div>
          </div>
        </section>

        <section class="history-section" aria-label="History">
          <div class="history-head">
            <h3 data-i18n="history">History</h3>
            <button id="clearHistoryButton" type="button">Clear</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
