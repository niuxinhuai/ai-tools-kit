name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check
        run: npm run check

      - name: Smoke test
        run: npm run test:smoke

      - name: CLI test
        run: npm run test:cli

      - name: API test
        run: npm run test:api

      - name: Package dry run
        run: npm run test:package
